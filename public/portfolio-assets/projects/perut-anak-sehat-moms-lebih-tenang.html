<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Probiotik Anak untuk Moms | Interactive Fullscreen Slides</title>
<style>
  :root {
    --ink:#17231b; --muted:#667568; --paper:#fffdf4; --white:#ffffff;
    --mint:#bff6da; --leaf:#28b779; --deep:#0f5d3e; --lime:#dcff80;
    --aqua:#9de8ff; --blue:#6a95ff; --sun:#ffd35a; --coral:#ff806d;
    --pink:#f47aa6; --violet:#9b72ff; --cream:#fff4cf; --shadow:0 26px 80px rgba(13,46,28,.18);
    --r:clamp(24px,3.2vmin,48px);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden;background:#07110c;color:var(--ink);font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif}
  .deck{position:relative;width:100vw;height:100vh;overflow:hidden;background:
    radial-gradient(circle at 8% 10%, rgba(220,255,128,.58), transparent 25%),
    radial-gradient(circle at 88% 8%, rgba(157,232,255,.62), transparent 23%),
    radial-gradient(circle at 86% 86%, rgba(244,122,166,.26), transparent 30%),
    linear-gradient(130deg,#faffef 0%,#f8fff7 42%,#fff5df 100%);}
  .deck::before{content:"";position:absolute;inset:-30%;background:conic-gradient(from 120deg, rgba(40,183,121,.18), rgba(157,232,255,.26), rgba(255,211,90,.2), rgba(244,122,166,.16), rgba(40,183,121,.18));animation:slowSpin 34s linear infinite;opacity:.75;z-index:0}
  @keyframes slowSpin{to{transform:rotate(360deg)}}
  .noise{position:absolute;inset:0;opacity:.12;background-image:radial-gradient(rgba(23,35,27,.28) 1px, transparent 1px);background-size:18px 18px;z-index:1;pointer-events:none;mask-image:linear-gradient(to bottom, transparent, #000 10%, #000 88%, transparent)}
  .blob{position:absolute;border-radius:999px;filter:blur(18px);mix-blend-mode:multiply;opacity:.82;z-index:1;animation:drift 16s ease-in-out infinite alternate}
  .blob.one{width:32vw;height:32vw;background:rgba(191,246,218,.85);left:-10vw;top:8vh}
  .blob.two{width:26vw;height:26vw;background:rgba(255,211,90,.6);right:6vw;top:-9vh;animation-delay:-6s}
  .blob.three{width:30vw;height:30vw;background:rgba(106,149,255,.18);left:42vw;bottom:-12vh;animation-delay:-2s}
  .blob.four{width:22vw;height:22vw;background:rgba(244,122,166,.24);right:-8vw;bottom:10vh;animation-delay:-9s}
  @keyframes drift{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(3vw,2vh,0) scale(1.15)}}
  .microbe-field{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
  .micro{position:absolute;width:clamp(8px,1.3vmin,17px);height:clamp(8px,1.3vmin,17px);border-radius:50%;background:rgba(40,183,121,.24);box-shadow:inset -3px -4px 0 rgba(0,0,0,.05);animation:floaty var(--d) ease-in-out infinite alternate}
  .micro::before,.micro::after{content:"";position:absolute;background:rgba(255,255,255,.8);border-radius:50%;width:25%;height:25%;top:25%}
  .micro::before{left:24%} .micro::after{right:24%}
  @keyframes floaty{to{transform:translateY(-34px) rotate(24deg)}}

  .hud{position:absolute;left:clamp(14px,2vw,30px);right:clamp(14px,2vw,30px);top:clamp(12px,2vh,24px);z-index:35;display:flex;align-items:center;gap:12px;transition:opacity .25s ease, transform .25s ease}
  .deck.title-mode .hud{opacity:0;transform:translateY(-10px);pointer-events:none}
  .deck.title-mode .controls{opacity:0;pointer-events:none}
  .deck.title-mode:hover .controls{opacity:.92;pointer-events:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.58);backdrop-filter:blur(18px);border:1px solid rgba(23,35,27,.1);font-weight:950;letter-spacing:-.035em;white-space:nowrap;box-shadow:0 10px 28px rgba(23,35,27,.08)}
  .brandmark{width:30px;height:30px;border-radius:11px;background:linear-gradient(135deg,var(--leaf),var(--aqua));display:grid;place-items:center;color:white;font-weight:1000}
  .progressBox{height:11px;flex:1;background:rgba(255,255,255,.5);border:1px solid rgba(23,35,27,.09);border-radius:999px;overflow:hidden;backdrop-filter:blur(16px)}
  .progress{height:100%;width:0;background:linear-gradient(90deg,var(--leaf),var(--lime),var(--sun),var(--coral));border-radius:999px;transition:width .35s ease}
  .count{min-width:76px;text-align:center;padding:10px 13px;border-radius:999px;background:rgba(255,255,255,.6);border:1px solid rgba(23,35,27,.1);font-weight:950;box-shadow:0 10px 28px rgba(23,35,27,.08)}

  .slides{position:absolute;inset:0;z-index:10}
  .slide{position:absolute;inset:0;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(330px,.82fr);gap:clamp(22px,4vw,70px);padding:clamp(78px,9vh,118px) clamp(42px,7.2vw,124px) clamp(70px,8vh,112px);opacity:0;pointer-events:none;transform:translateX(5vw) scale(.985);transition:opacity .52s ease,transform .62s cubic-bezier(.2,.9,.16,1);overflow:hidden}
  .slide.active{opacity:1;pointer-events:auto;transform:translateX(0) scale(1)}
  .slide.before{transform:translateX(-5vw) scale(.985)}
  .slide.title{display:grid;place-items:center;text-align:center;padding:clamp(42px,8vh,100px);grid-template-columns:1fr;}
  .slide.title h1{font-size:clamp(54px,11vmin,132px);max-width:12ch;line-height:.82;letter-spacing:-.085em;margin:0;text-wrap:balance}
  .presenter{font-size:clamp(18px,3vmin,34px);font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-top:clamp(20px,4vh,44px);color:#246244}
  .titleGlow{position:absolute;width:52vmin;height:52vmin;border-radius:50%;background:radial-gradient(circle,rgba(220,255,128,.9),rgba(157,232,255,.34) 44%,transparent 72%);filter:blur(4px);animation:breathe 4.5s ease-in-out infinite alternate;z-index:-1}
  @keyframes breathe{to{transform:scale(1.18);opacity:.78}}

  .copy{min-width:0;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:3}
  .copyInner{transform-origin:left center;max-width:100%;}
  h1{font-size:clamp(34px,7.4vmin,88px);line-height:.91;letter-spacing:-.075em;margin:0 0 clamp(14px,2.4vh,26px);font-weight:1000;max-width:12.2ch;text-wrap:balance}
  .data h1{max-width:13ch}
  .bridge h1{max-width:11.8ch}
  .body{font-size:clamp(16px,2.65vmin,34px);line-height:1.14;letter-spacing:-.032em;font-weight:680;color:#27392b;max-width:27ch;white-space:pre-line;text-wrap:balance}
  .body.compact{font-size:clamp(14px,2.1vmin,25px);line-height:1.15;max-width:42ch}
  .body.small{font-size:clamp(11px,1.42vmin,17px);line-height:1.22;max-width:100%;letter-spacing:-.012em;column-count:2;column-gap:clamp(18px,4vw,52px);font-weight:620;color:#394b3f;text-wrap:auto}
  .bigNumber{font-size:clamp(68px,17vmin,190px);line-height:.78;letter-spacing:-.1em;font-weight:1000;margin:clamp(4px,1vh,10px) 0 clamp(10px,2vh,22px);background:linear-gradient(130deg,#0c7d52,#58ce68,#ff9567);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 18px 30px rgba(40,183,121,.14))}
  .note{font-size:clamp(13px,1.8vmin,21px);line-height:1.26;color:#5b6f61;font-weight:720;max-width:41ch;white-space:pre-line;margin-top:clamp(12px,2vh,22px)}
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:clamp(18px,3vh,34px)}
  .chip{padding:10px 13px;border-radius:999px;background:rgba(255,255,255,.56);border:1px solid rgba(23,35,27,.1);backdrop-filter:blur(16px);font-size:clamp(12px,1.5vmin,16px);font-weight:900;color:#255037;box-shadow:0 10px 24px rgba(23,35,27,.06)}

  .visual{position:relative;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0;z-index:2}
  .artCard{position:relative;width:min(42vw,58vmin,560px);aspect-ratio:1/1;border-radius:var(--r);background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.26));border:1px solid rgba(255,255,255,.8);backdrop-filter:blur(22px);box-shadow:var(--shadow);overflow:hidden;isolation:isolate;transform-style:preserve-3d}
  .slide.active .artCard{animation:cardIn .75s cubic-bezier(.2,.9,.16,1) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(24px) rotateX(5deg) scale(.96)}to{opacity:1;transform:none}}
  .artCard::before{content:"";position:absolute;inset:-35%;background:conic-gradient(from 100deg,rgba(255,211,90,.44),rgba(157,232,255,.4),rgba(220,255,128,.48),rgba(244,122,166,.22),rgba(255,211,90,.44));animation:slowSpin 13s linear infinite;z-index:-2}
  .artCard::after{content:"";position:absolute;inset:12px;border-radius:calc(var(--r) - 10px);background:rgba(255,255,255,.66);z-index:-1}
  .art{position:absolute;inset:7%;display:grid;place-items:center}
  svg{width:100%;height:100%;overflow:visible}
  .floatingBadge{position:absolute;left:7%;right:7%;bottom:7%;padding:14px 16px;border-radius:24px;background:rgba(255,255,255,.72);border:1px solid rgba(23,35,27,.09);backdrop-filter:blur(14px);box-shadow:0 14px 36px rgba(23,35,27,.11);font-weight:900;color:#214730;font-size:clamp(12px,1.7vmin,18px);line-height:1.14}
  .ringOrbit{position:absolute;inset:8%;border:1px dashed rgba(40,183,121,.28);border-radius:50%;animation:slowSpin 26s linear infinite}
  .ringOrbit::before,.ringOrbit::after{content:"";position:absolute;width:clamp(14px,3vmin,30px);height:clamp(14px,3vmin,30px);border-radius:50%;background:var(--lime);box-shadow:0 12px 28px rgba(40,183,121,.14)}
  .ringOrbit::before{left:13%;top:4%} .ringOrbit::after{right:5%;bottom:16%;background:var(--aqua)}

  .chartPanel{position:absolute;left:8%;right:8%;bottom:7%;border-radius:28px;background:rgba(255,255,255,.78);border:1px solid rgba(23,35,27,.09);backdrop-filter:blur(16px);padding:clamp(12px,2vmin,20px);box-shadow:0 16px 42px rgba(23,35,27,.10)}
  .chartTitle{font-size:clamp(10px,1.35vmin,14px);font-weight:950;text-transform:uppercase;letter-spacing:.08em;color:#2b6041;margin-bottom:12px}
  .bars{height:clamp(96px,18vmin,160px);display:flex;align-items:flex-end;gap:clamp(10px,2vmin,18px);padding:8px 5px 26px}
  .bar{flex:1;border-radius:16px 16px 10px 10px;background:linear-gradient(180deg,var(--c),rgba(255,255,255,.55));height:0;position:relative;transition:height 1.2s cubic-bezier(.16,.8,.2,1)}
  .active .bar{height:var(--h)}
  .bar b{position:absolute;left:50%;top:-28px;transform:translateX(-50%);font-size:clamp(13px,1.9vmin,20px);font-weight:1000}
  .bar span{position:absolute;left:50%;bottom:-25px;transform:translateX(-50%);font-size:clamp(10px,1.35vmin,14px);font-weight:900;color:#5a6c60}
  .donut{width:clamp(130px,25vmin,240px);aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--leaf) calc(var(--p)*1%), rgba(23,35,27,.08) 0);display:grid;place-items:center;margin:auto;box-shadow:inset 0 0 0 clamp(20px,4vmin,38px) rgba(255,255,255,.76)}
  .donut strong{font-size:clamp(30px,6vmin,64px);letter-spacing:-.06em}
  .waves{height:clamp(90px,17vmin,160px);position:relative;border-radius:20px;background:linear-gradient(to top,rgba(157,232,255,.75),rgba(255,255,255,.4));overflow:hidden}
  .waves::before,.waves::after{content:"";position:absolute;left:-20%;width:140%;height:74%;bottom:12%;background:rgba(40,183,121,.22);border-radius:46% 54% 48% 52%;animation:wave 5s ease-in-out infinite}
  .waves::after{background:rgba(106,149,255,.22);bottom:20%;animation-duration:7s;animation-delay:-1.6s}
  @keyframes wave{50%{transform:translateX(7%) rotate(4deg)}}

  .ref{position:absolute;left:clamp(42px,7.2vw,124px);right:clamp(42px,7.2vw,124px);bottom:clamp(14px,2.2vh,28px);font-size:clamp(8px,1.05vmin,12px);line-height:1.22;color:rgba(23,35,27,.56);z-index:25;display:flex;gap:8px;align-items:flex-end}
  .ref b{color:#2f6043}
  .ref span{display:block;max-width:100%}
  .slide.title .ref{display:none}

  .controls{position:absolute;right:clamp(12px,2vw,26px);bottom:clamp(12px,2vh,24px);z-index:50;display:flex;gap:9px;transition:opacity .25s ease}
  button{border:0;border-radius:999px;padding:11px 15px;background:rgba(255,255,255,.66);border:1px solid rgba(23,35,27,.1);backdrop-filter:blur(16px);font-weight:950;color:#183322;box-shadow:0 12px 32px rgba(23,35,27,.1);cursor:pointer}
  button:hover{transform:translateY(-2px);background:rgba(255,255,255,.9)}
  .hint{display:none}

  .menu{position:absolute;top:clamp(64px,9vh,92px);left:clamp(12px,2vw,26px);bottom:clamp(70px,9vh,100px);width:min(340px,88vw);z-index:70;overflow:auto;padding:12px;border-radius:28px;background:rgba(255,255,255,.72);border:1px solid rgba(23,35,27,.12);backdrop-filter:blur(22px);box-shadow:var(--shadow);transform:translateX(-112%);transition:transform .3s ease}
  .menu.open{transform:translateX(0)}
  .thumb{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;width:100%;text-align:left;padding:10px;border-radius:17px;background:rgba(255,255,255,.44);box-shadow:none;margin-bottom:8px}
  .thumb.active{background:rgba(191,246,218,.68);border-color:rgba(40,183,121,.28)}
  .thumbNo{width:32px;height:32px;border-radius:11px;background:linear-gradient(135deg,var(--leaf),var(--aqua));color:#fff;display:grid;place-items:center;font-size:12px;font-weight:1000}
  .thumbTxt{font-size:13px;line-height:1.1;font-weight:900;color:#1d3425;letter-spacing:-.02em}

  .mythGrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px;max-width:44ch}
  .mythCard{padding:13px 14px;border-radius:20px;background:rgba(255,255,255,.63);border:1px solid rgba(23,35,27,.09);font-size:clamp(13px,1.75vmin,19px);line-height:1.16;font-weight:800;box-shadow:0 12px 30px rgba(23,35,27,.07)}
  .mythCard strong{display:block;color:#0f6845;margin-bottom:4px}
  .faqItem{padding:14px 16px;border-radius:22px;background:rgba(255,255,255,.64);border:1px solid rgba(23,35,27,.09);margin:10px 0;box-shadow:0 12px 30px rgba(23,35,27,.07)}
  .faqQ{font-weight:1000;color:#0f6845;font-size:clamp(14px,1.9vmin,21px);margin-bottom:5px}
  .faqA{font-weight:730;color:#2b3e30;font-size:clamp(13px,1.7vmin,19px);line-height:1.18}

  .spotlight{position:absolute;z-index:5;width:24vw;height:24vw;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.68),transparent 68%);mix-blend-mode:screen;pointer-events:none;opacity:.56;transform:translate(-50%,-50%);transition:opacity .2s}

  @media(max-width: 900px){
    .slide{grid-template-columns:1fr;gap:clamp(12px,2vh,22px);padding:clamp(78px,9vh,96px) clamp(22px,5vw,38px) clamp(82px,10vh,110px);overflow:auto}
    .slide.title{padding:clamp(42px,8vh,80px)}
    .copy{justify-content:flex-start}
    h1{font-size:clamp(32px,9.5vmin,62px);max-width:13ch}
    .body{font-size:clamp(16px,4.1vmin,25px);max-width:100%}
    .body.small{column-count:1;font-size:clamp(11px,3vmin,15px)}
    .bigNumber{font-size:clamp(70px,22vmin,130px)}
    .visual{min-height:min(36vh,340px)}
    .artCard{width:min(72vw,340px)}
    .ref{left:clamp(22px,5vw,38px);right:clamp(22px,5vw,38px);bottom:clamp(48px,7vh,78px);font-size:9px}
    .brand span{display:none}
    .count{min-width:58px;padding:9px 10px;font-size:12px}
    .hint{display:none}
    .controls{left:12px;right:12px;justify-content:center}
  }
  @media(max-width: 520px){button{padding:10px 12px;font-size:12px} .progressBox{height:9px} .brandmark{width:28px;height:28px}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="deck" id="deck">
  <div class="noise"></div><div class="blob one"></div><div class="blob two"></div><div class="blob three"></div><div class="blob four"></div>
  <div class="microbe-field" id="microbes"></div><div class="spotlight" id="spotlight"></div>
  <div class="hud"><div class="brand"><div class="brandmark">●</div><span>Probiotik Anak</span></div><div class="progressBox"><div class="progress" id="progress"></div></div><div class="count" id="count"></div></div>
  <section class="slides" id="slides"></section>
  <nav class="menu" id="menu"></nav>
  <div class="hint">Pakai panah keyboard · F fullscreen · M daftar slide</div>
  <div class="controls"><button id="menuBtn">Daftar</button><button id="prevBtn">←</button><button id="nextBtn">→</button><button id="fullBtn">Full</button></div>
</main>

engganti makan sehat\n\nBayangkan perut anak seperti kebun kecil  \nKalau dirawat dengan baik  \nbakteri baik bisa tumbuh lebih seimbang", "visual": "garden", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "content", "title": "Di Perut Anak Ada Banyak Bakteri", "body": "Tidak semua bakteri itu berbahaya\n\nDi dalam usus anak  \nada bakteri baik yang membantu tubuh bekerja lebih nyaman\n\nTugasnya membantu pencernaan  \nmendukung daya tahan tubuh  \ndan menjaga perut tidak mudah rewel", "visual": "microbes", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "content", "title": "Probiotik Bukan Obat Langsung Sembuh", "body": "Probiotik tidak bekerja seperti obat demam\n\nHari ini minum  \nbesok langsung sembuh total  \ntidak selalu seperti itu\n\nProbiotik lebih seperti bantuan tambahan  \nuntuk membantu usus kembali lebih seimbang\n\nYang utama tetap cairan  \nmakan yang cukup  \ndan istirahat", "visual": "calendar", "refs": ["Collinson S, Deans A, Padua-Zamora A, et al. Probiotics for treating acute infectious diarrhoea. Cochrane Database Syst Rev. 2020;12(12):CD003048. doi:10.1002/14651858.CD003048.pub4", "Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "content", "title": "Kapan Probiotik Sering Dibutuhkan", "body": "Probiotik sering dipakai saat anak sedang diare\n\nTerutama kalau diare ringan  \natau saat anak sedang minum antibiotik\n\nKarena antibiotik kadang ikut mengganggu bakteri baik di usus\n\nTapi tetap lihat kondisi anak ya moms  \nkalau lemas , "visual": "dose", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "content", "title": "Probiotik Bukan Pengganti Makanan Bergizi", "body": "Anak tetap butuh makan yang baik\n\nNasi  \nlauk  \nsayur  \nbuah  \nsusu atau ASI sesuai usia\n\nProbiotik hanya membantu  \nbukan menggantikan makanan utama\n\nPerut sehat tetap dimulai dari makan harian yang baik", "visual": "plate", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633", "UNICEF Data. Diarrhoea. Updated November 2024. Accessed June 15, 2026."]}, {"type": "content", "title": "Makanan Juga Bisa Bantu Bakteri Baik", "body": "Bakteri baik suka makanan yang berserat\n\nContohnya buah  \nsayur  \nkacang kacangan  \ntempe  \ndan makanan rumahan yang bergizi\n\nKalau anak susah makan sayur  \nmulai sedikit dulu\n\nTidak perlu langsung banyak  \nyang penting rutin", "visual": "fiber", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "content", "title": "Yogurt Itu Boleh Tapi Tetap Pilih Yang Tepat", "body": "Yogurt bisa jadi pilihan  \nkalau anak sudah sesuai usianya  \ndan tidak punya alergi atau masalah tertentu\n\nPilih yang tidak terlalu manis\n\nKarena kalau gulanya tinggi  \nmanfaatnya bisa kalah dengan gulanya\n\nUntuk anak kecil  \nlebih aman mulai dari porsi kecil dulu", "visual": "yogurt", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {" isual": "shield", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "content", "title": "Cara Simpan Juga Penting", "body": "Probiotik bisa rusak kalau penyimpanannya salah\n\nBaca aturan di kemasan\n\nAda yang perlu disimpan di suhu ruang  \nada yang perlu kulkas\n\nJangan taruh di tempat panas  \njangan campur dengan minuman yang terlalu panas\n\nKalau bakterinya rusak  \nmanfaatnya bisa berkurang", "visual": "storage", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "myth", "title": "Mitos vs Fakta", "body": "Mitos\nProbiotik bisa menggantikan oralit saat diare\n\nFakta\nTidak. Saat diare, cairan tetap paling utama\n\nMitos\nSemua probiotik pasti cocok untuk semua anak\n\nFakta\nTidak selalu. Anak dengan kondisi khusus perlu tanya dokter dulu\n\nMitos\nSemua yogurt pasti sama dengan probiotik\n\nFakta\nTidak semua punya bakteri hidup dan jumlah yang jelas", "visual": "myth", "refs": ["UNICEF Supply Division. Oral Rehydration Salts and Zinc. Accessed June 15, 2026.", "Szajewska H, Berni Canani R, Domellöf M, et al. Probiotics for the management of pediatric gastrointestinal disorders. J Pediatr Gastroenterol Nutr. 2023;76(2):232-247. doi:10.1097/MPG.0000000000003633"]}, {"type": "faq", "title": "FAQ Moms", "body": "Boleh diminum tiap hari\nTergantung produk, usia anak, dan kebutuhannya. Ikuti aturan pakai atau saran dokter\n\nKapan harus berhenti\nBila muncul keluhan yang tidak biasa, anak makin lemas, atau diare memburuk, hentikan dan periksa\n\nBoleh dicampur susu hangat\nJangan campur dengan minuman terlalu panas karena bakteri baik bisa rusak", "visual": "faq", "refs": ["Szajewska H, Berni Canani R, Domellöf M, et function esc(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
const NL = String.fromCharCode(10);
function para(text){ return esc(text||'').split(NL).join('<br>'); }
function splitFaq(body){
  const parts = String(body||'').split(NL+NL).filter(Boolean);
  return '<div class="faqWrap">'+parts.map(p=>{const lines=p.split(NL);return `<div class="faqItem"><div class="faqQ">${esc(lines[0])}</div><div class="faqA">${esc(lines.slice(1).join(' '))}</div></div>`}).join('')+'</div>';
}
function splitMyth(body){
  const chunks=String(body||'').split(NL+NL).filter(Boolean);
  let html='<div class="mythGrid">';
  for(let i=0;i<chunks.length;i+=2){
    const a=chunks[i]?.split(NL)||[]; const b=chunks[i+1]?.split(NL)||[];
    html += `<div class="mythCard"><strong>${esc(a[0]||'Mitos')}</strong>${esc(a.slice(1).join(' '))}</div>`;
    html += `<div class="mythCard"><strong>${esc(b[0]||'Fakta')}</strong>${esc(b.slice(1).join(' '))}</div>`;
  }
  return html+'</div>';
}

  let body = microbes;

function chartHtml(chart){
  if(!chart) return '';
  if(chart.kind==='bars'){
    const max = Math.max(...chart.items.map(x=>x[2]));
    return `<div class="chartPanel"><div class="chartTitle">Perbandingan data</div><div class="bars">${chart.items.map(x=>`<div class="bar" style="--h:${Math.max(12, x[2]/max*100)}%;--c:${x[3]}"><b>${x[1]}%</b><span>${x[0]}</span></div>`).join('')}</div></div>`;
  }
  if(chart.kind==='donut'||chart.kind==='ring') return `<div class="chartPanel"><div class="chartTitle">${esc(chart.label||'data')}</div><div class="donut" style="--p:${chart.value}"><strong>${String(chart.value).replace('.',',')}%</strong></div></div>`;
  if(chart.kind==='waves') return `<div class="chartPanel"><div class="chartTitle">Fokus utama saat diare</div><div class="waves"></div></div>`;
  return '';
}

function slideHtml(s, i){
  if(s.type==='title'){return `<article class="slide title" data-title="${esc(s.title.split(NL).join(' '))}"><div class="titleGlow"></div><div><h1>${para(s.title)}</h1><div class="presenter">${esc(s.name)}</div></div></article>`}
  let body = s.type==='faq' ? splitFaq(s.body) : s.type==='myth' ? splitMyth(s.body) : para(s.body);
  let bodyClass = s.type==='biblio' ? 'body small' : s.type==='myth'||s.type==='faq' ? 'body compact' : 'body';
  let ref = s.refs&&s.refs.length ? `<footer class="ref"><span><b>Referensi</b> ${s.refs.map((r,idx)=>`${idx+1}. ${esc(r)}`).join(' ')}</span></footer>` : '';
  let dataPieces = s.big ? `<div class="bigNumber">${esc(s.big)}</div><div class="body">${para(s.body)}</div><div class="note">${para(s.note||'')}</div>` : `<div class="${bodyClass}">${body}</div>`;
  if(s.type==='biblio') dataPieces = `<div class="body small">${para(s.body)}</div>`;
  return `<article class="slide ${esc(s.type)}" data-title="${esc(s.title)}"><div class="copy"><div class="copyInner"><h1>${esc(s.title)}</h1>${dataPieces}</div></div><div class="visual"><div class="artCard"><div class="ringOrbit"></div><div class="art">${visualSvg(s.visual)}</div>${chartHtml(s.chart)}<div class="floatingBadge">${badgeText(s)}</div></div></div>${ref}</article>`;
}
function badgeText(s){
  const map={data:'Data Indonesia',bridge:'Jembatan pembahasan',content:'Inti materi moms',myth:'Klik slide untuk bahas pelan pelan',faq:'Pertanyaan yang sering muncul',take:'Ringkasan akhir',biblio:'Sumber rujukan'};
  if(s.visual==='water'||s.visual==='cup') return 'Cairan dulu baru lainnya';
  if(s.visual==='antibiotic') return 'Antibiotik harus bijak';
  if(s.visual==='strains') return 'Jenis probiotik itu penting';
  if(s.visual==='alert') return 'Kenali tanda bahaya';
  return map[s.type]||'Edukasi probiotik anak';
}

slidesEl.innerHTML = SLIDES.map(slideHtml).join('');
menu.innerHTML = SLIDES.map((s,i)=>`<button class="thumb" data-i="${i}"><span class="thumbNo">${i+1}</span><span class="thumbTxt">${esc(s.title.split(NL).join(' '))}</span></button>`).join('');
const slideEls = [...document.querySelectorAll('.slide')];
const thumbEls = [...document.querySelectorAll('.thumb')];

function go(n){
  current = (n + SLIDES.length) % SLIDES.length;
  slideEls.forEach((el,i)=>{el.classList.toggle('active',i===current); el.classList.toggle('before',i<current);});
  thumbEls.forEach((el,i)=>el.classList.toggle('active',i===current));
  progress.style.width = `${((current+1)/SLIDES.length)*100}%`;
  count.textContent = `${current+1} / ${SLIDES.length}`;
  deck.classList.toggle('title-mode', current===0);
  fitActive();
}
function fitActive(){
  const el = slideEls[current]?.querySelector('.copyInner'); if(!el) return;
  el.style.transform='scale(1)';
  const box = slideEls[current].querySelector('.copy');
  if(!box) return;
  const maxH = box.clientHeight;
  const h = el.scrollHeight;
  const maxW = box.clientWidth;
  const w = el.scrollWidth;
  const scale = Math.min(1, maxH/h, maxW/w);
  if(scale < .99) el.style.transform = `scale(${Math.max(.78, scale)})`;
}
document.getElementById('nextBtn').onclick=()=>go(current+1);
document.getElementById('prevBtn').onclick=()=>go(current-1);
document.getElementById('menuBtn').onclick=()=>menu.classList.toggle('open');
document.getElementById('fullBtn').onclick=()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); };
thumbEls.forEach(b=>b.onclick=()=>{go(+b.dataset.i); menu.classList.remove('open');});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(current+1)}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(current-1)}
  if(e.key.toLowerCase()==='m') menu.classList.toggle('open');
  if(e.key.toLowerCase()==='f') document.getElementById('fullBtn').click();
  if(e.key==='Home')go(0); if(e.key==='End')go(SLIDES.length-1);
});
window.addEventListener('resize',fitActive);
deck.addEventListener('pointermove',e=>{spotlight.style.left=e.clientX+'px';spotlight.style.top=e.clientY+'px';});
deck.addEventListener('pointerleave',()=>spotlight.style.opacity=.15);
deck.addEventListener('pointerenter',()=>spotlight.style.opacity=.56);

const field=document.getElementById('microbes');
for(let i=0;i<42;i++){
  const m=document.createElement('div'); m.className='micro';
  m.style.left=(Math.random()*100)+'%'; m.style.top=(Math.random()*100)+'%';
  m.style.setProperty('--d',(3+Math.random()*6)+'s');
  m.style.animationDelay=(-Math.random()*8)+'s';
  m.style.opacity=(.35+Math.random()*.55).toFixed(2);
  field.appendChild(m);
}
go(0);
</script>
