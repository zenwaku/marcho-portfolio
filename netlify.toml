[build]
  command = "pnpm run build"
  publish = "dist"

[[headers]]
  for = "/portfolio-assets/videos/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

[[headers]]
  for = "/portfolio-assets/**/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
